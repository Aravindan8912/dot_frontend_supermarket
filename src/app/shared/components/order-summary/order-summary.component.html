<aside class="order-summary" [class.closed]="!isOpen">
  <div class="order-summary-header">
    <h3 class="summary-title">Order Summary</h3>
    <button class="close-button" (click)="onClose()" aria-label="Close sidebar">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <line x1="18" y1="6" x2="6" y2="18"></line>
        <line x1="6" y1="6" x2="18" y2="18"></line>
      </svg>
    </button>
  </div>
  
  <div class="summary-content" *ngIf="isOpen">
    <div class="summary-section">
      <h3 class="section-title">Your Balance</h3>
      <div class="balance-card">
        <p class="balance-amount">{{ balance }}</p>
      </div>
      <div class="balance-actions">
        <button class="balance-button" (click)="onTopUp()">Top Up</button>
        <button class="balance-button" (click)="onTransfer()">Transfer</button>
      </div>
    </div>

    <div class="summary-section">
      <h3 class="section-title">Your Address</h3>
      <div class="address-info">
        <p class="address-text">{{ address }}</p>
        <button class="change-button">Change</button>
      </div>
      <p class="address-description">Delivery address for your orders</p>
      <div class="address-actions">
        <button class="address-button">Add Details</button>
        <button class="address-button">Add Note</button>
      </div>
    </div>

    <div class="summary-section">
      <h3 class="section-title">Order Menu</h3>
      <div class="order-items">
        @for (item of orderItems; track trackByOrderItem($index, item)) {
          <div class="order-item">
            <div class="order-item-image">
              <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <circle cx="12" cy="12" r="10"></circle>
              </svg>
            </div>
            <div class="order-item-info">
              <span class="order-item-name">{{ item.name }} x{{ item.quantity }}</span>
              <span class="order-item-price">{{ item.price }}</span>
            </div>
          </div>
        }
        <div class="order-total-line">
          <span>Service</span>
          <span>{{ serviceCharge }}</span>
        </div>
        <div class="order-total">
          <span>Total</span>
          <span>{{ total }}</span>
        </div>
      </div>
      <button class="coupon-button">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M21 12V7H5a2 2 0 0 1 0-4h14v4"></path>
          <path d="M3 5v14a2 2 0 0 0 2 2h16v-5"></path>
          <path d="M18 12a2 2 0 1 0 0-4 2 2 0 0 0 0 4z"></path>
        </svg>
        Have a coupon code?
      </button>
      <button class="checkout-button" (click)="onCheckout()">Checkout</button>
    </div>
  </div>
</aside>
