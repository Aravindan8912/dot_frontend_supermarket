@if (isOpen) {
  <div class="dialog-overlay" (click)="onOverlayClick()">
    <div class="dialog-modal" (click)="onModalClick($event)" [style.max-width]="maxWidth">
      <div class="dialog-header">
        <h2 class="dialog-title">{{ title }}</h2>
        <button type="button" class="dialog-close" (click)="onClose()" aria-label="Close">×</button>
      </div>
      <div class="dialog-body">
        <ng-content></ng-content>
      </div>
      <div class="dialog-actions-wrapper">
        <ng-content select="[dialogActions]"></ng-content>
      </div>
    </div>
  </div>
}
