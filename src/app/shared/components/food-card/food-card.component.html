<div class="food-card">
  <div class="food-image-container">
    @if (image) {
      <img [src]="image" [alt]="name" class="food-image">
    } @else {
      <div class="food-image-placeholder">
        <svg width="60" height="60" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M12 2L2 7l10 5 10-5-10-5z"></path>
          <path d="M2 17l10 5 10-5"></path>
          <path d="M2 12l10 5 10-5"></path>
        </svg>
      </div>
    }
    @if (discount) {
      <span class="discount-badge">{{ discount }} Off</span>
    }
    @if (showFavorite) {
      <button class="favorite-button" (click)="onToggleFavorite()" [class.active]="isFavorite">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"></path>
        </svg>
      </button>
    }
  </div>
  <div class="food-info">
    @if (rating > 0) {
      <div class="food-rating">
        @for (star of [].constructor(rating); track $index) {
          <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor" stroke="currentColor" stroke-width="2">
            <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"></polygon>
          </svg>
        }
      </div>
    }
    <h3 class="food-name">{{ name }}</h3>
    <div class="food-footer">
      <span class="food-price">{{ price }}</span>
      @if (showDistance && distance && deliveryTime) {
        <span class="food-delivery">{{ distance }} • {{ deliveryTime }}</span>
      } @else {
        <button class="add-button" (click)="onAddToCart()">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="12" y1="5" x2="12" y2="19"></line>
            <line x1="5" y1="12" x2="19" y2="12"></line>
          </svg>
        </button>
      }
    </div>
  </div>
</div>
